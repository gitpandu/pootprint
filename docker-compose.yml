services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pootprint-app
    ports:
      - "8080:3000"
    volumes:
      - pootprint-data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=/app/data/pootprint.db
      - NODE_ENV=production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 150M
        reservations:
          memory: 40M

volumes:
  pootprint-data:
    driver: local
