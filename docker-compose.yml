services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pootprint-app
    ports:
      - "8080:3000"
    volumes:
      - pootprint-data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=/app/data/pootprint.db
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Resource constraints to safeguard the low-resource STB
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 150M
        reservations:
          memory: 40M

volumes:
  pootprint-data:
    driver: local
